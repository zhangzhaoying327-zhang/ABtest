<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>OTT AB实验智慧复盘系统 v5.2</title>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jstat@latest/dist/jstat.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .card { background: white; border-radius: 16px; box-shadow: 0 4px 20px -5px rgba(0,0,0,0.1); border: 1px solid #f1f5f9; }
        .btn-grad { background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%); transition: all 0.2s; }
        .btn-grad:hover { transform: translateY(-1px); box-shadow: 0 5px 15px rgba(37, 99, 235, 0.4); }
        .metric-row { animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        select { border: 1px solid #e2e8f0 !important; outline: none; }
        .log-box::-webkit-scrollbar { width: 4px; }
        .log-box::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }
    </style>
</head>
<body class="bg-[#f8fafc] min-h-screen p-4 md:p-8 font-sans text-slate-800">

<div class="max-w-7xl mx-auto">
    <!-- Header -->
    <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
        <div>
            <h1 class="text-3xl font-black text-slate-900 tracking-tighter">OTT AB分析-多指标版 <span class="text-blue-600 italic">v5.2</span></h1>
            <p class="text-slate-400 font-bold text-[10px] uppercase tracking-[0.2em]">记得V张昭颖50</p>
        </div>
        <div class="flex gap-3">
            <div id="fileStatus" class="hidden bg-emerald-50 text-emerald-600 px-4 py-2 rounded-xl text-xs font-black border border-emerald-100 italic">数据已就绪</div>
            <button onclick="document.getElementById('fileInput').click()" class="bg-white border-2 border-slate-200 px-4 py-2 rounded-xl text-xs font-black hover:bg-slate-50 transition-all">上传数据</button>
            <input type="file" id="fileInput" class="hidden" accept=".xlsx,.xls,.csv" />
        </div>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
        <!-- 左侧配置：全局定义 -->
        <aside class="lg:col-span-4 space-y-6">
            <div class="card p-6">
                <h3 class="text-xs font-black text-slate-400 mb-4 uppercase tracking-widest flex justify-between">
                    <span>1. 基础维度定义</span>
                    <span id="rowCount" class="text-blue-500"></span>
                </h3>
                <div class="space-y-4">
                    <div><label class="text-[10px] font-black text-slate-500 block mb-1">时间轴列</label><select id="dateCol" class="w-full rounded-lg p-2 text-xs font-bold bg-slate-50"></select></div>
                    
                    <div class="grid grid-cols-2 gap-4">
                        <div class="bg-blue-50 p-3 rounded-xl border border-blue-100">
                            <label class="text-[9px] font-black text-blue-600 block mb-2 uppercase">策略组 (A)</label>
                            <select id="aCol" class="w-full mb-1 text-[10px] p-1.5 rounded bg-white font-bold" onchange="refreshValues('a')"></select>
                            <select id="aVal" class="w-full text-[10px] p-1 rounded bg-white border-blue-200 font-mono"></select>
                        </div>
                        <div class="bg-slate-50 p-3 rounded-xl border border-slate-200">
                            <label class="text-[9px] font-black text-slate-500 block mb-2 uppercase">对照组 (B)</label>
                            <select id="bCol" class="w-full mb-1 text-[10px] p-1.5 rounded bg-white font-bold" onchange="refreshValues('b')"></select>
                            <select id="bVal" class="w-full text-[10px] p-1 rounded bg-white border-slate-300 font-mono"></select>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 核心：指标构建器 -->
            <div id="metricSection" class="card p-6 hidden">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-xs font-black text-slate-400 uppercase tracking-widest">2. 指标组合构建</h3>
                    <button onclick="addMetricRow()" class="text-[10px] bg-blue-600 text-white px-2 py-1 rounded font-black hover:bg-blue-700">+ 添加指标</button>
                </div>
                
                <div id="metricList" class="space-y-3 max-h-[400px] overflow-y-auto pr-2 log-box">
                    <!-- 指标行将在此动态生成 -->
                </div>

                <button id="runBtn" class="w-full btn-grad text-white font-black py-4 rounded-xl shadow-xl uppercase tracking-widest text-xs mt-6">执行全指标自动化分析</button>
            </div>
            
            <div id="sysLog" class="bg-slate-900 rounded-xl p-3 text-[9px] text-emerald-400 font-mono h-24 overflow-y-auto log-box">
                <div>> 等待数据导入...</div>
            </div>
        </aside>

        <!-- 右侧：多指标分析报告 -->
        <main class="lg:col-span-8 space-y-6">
            <div id="emptyState" class="card flex flex-col items-center justify-center py-40 text-slate-300">
                <svg class="w-16 h-16 mb-4 opacity-20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                <p class="font-black tracking-widest text-xs uppercase">请完成左侧配置并执行分析</p>
            </div>

            <div id="resultArea" class="hidden space-y-6">
                <!-- 指标汇总一览表 (Scorecard) -->
                <div class="card overflow-hidden">
                    <div class="p-6 border-b bg-slate-50 flex justify-between items-center">
                        <h2 class="text-lg font-black italic">多指标实验汇总 (Scorecard)</h2>
                        <button id="exportBtn" class="bg-emerald-600 text-white px-4 py-2 rounded-lg text-xs font-black flex items-center gap-2">导出完整报表</button>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead class="bg-slate-900 text-white text-[10px] font-black uppercase tracking-wider">
                                <tr>
                                    <th class="px-6 py-4">分析指标</th>
                                    <th class="px-6 py-4">策略组 (A)</th>
                                    <th class="px-6 py-4">对照组 (B)</th>
                                    <th class="px-6 py-4 text-center">提效 (Lift)</th>
                                    <th class="px-6 py-4 text-right">显著性 (P-Value)</th>
                                </tr>
                            </thead>
                            <tbody id="scorecardBody" class="text-xs font-bold"></tbody>
                        </table>
                    </div>
                </div>

                <!-- 趋势详情 (带切换) -->
                <div class="card p-6">
                    <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
                        <h2 class="text-lg font-black italic flex items-center gap-2">
                            <span class="w-2 h-2 bg-blue-500 rounded-full animate-pulse"></span>
                            指标走势详情
                        </h2>
                        <select id="chartMetricSelector" class="bg-white border rounded-lg px-3 py-1.5 text-xs font-black text-blue-600" onchange="updateChart()"></select>
                    </div>
                    <div class="h-[350px]"><canvas id="trendChart"></canvas></div>
                </div>
            </div>
        </main>
    </div>
</div>

<script>
    let state = { raw: [], headers: [], results: [], chart: null };

    // 1. 初始化指标行
    function addMetricRow(numName = "", denName = "") {
        const container = document.getElementById('metricList');
        const id = Date.now() + Math.random();
        const div = document.createElement('div');
        div.className = "metric-row p-3 bg-white border border-slate-200 rounded-xl space-y-2 relative group shadow-sm";
        div.id = `metric-${id}`;
        
        div.innerHTML = `
            <div class="flex items-center justify-between mb-1">
                <input type="text" placeholder="指标名称(如:点击率)" class="name-input text-[10px] font-black text-slate-800 border-b border-dashed focus:border-blue-500 outline-none w-32" value="${numName ? numName+'率' : ''}">
                <button onclick="document.getElementById('metric-${id}').remove()" class="text-slate-300 hover:text-red-500">
                    <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"></path></svg>
                </button>
            </div>
            <div class="grid grid-cols-2 gap-2">
                <div>
                    <label class="text-[8px] text-slate-400 font-bold">分子 (Numerator)</label>
                    <select class="num-sel w-full text-[10px] p-1 rounded bg-slate-50 border-0"></select>
                </div>
                <div>
                    <label class="text-[8px] text-slate-400 font-bold">分母 (Denominator)</label>
                    <select class="den-sel w-full text-[10px] p-1 rounded bg-slate-50 border-0"></select>
                </div>
            </div>
        `;
        container.appendChild(div);
        
        // 填充下拉框
        const nSel = div.querySelector('.num-sel'), dSel = div.querySelector('.den-sel');
        state.headers.forEach(h => {
            nSel.add(new Option(h, h));
            dSel.add(new Option(h, h));
        });
        
        if(numName) nSel.value = numName;
        if(denName) dSel.value = denName;
    }

    function addLog(msg) {
        const lb = document.getElementById('sysLog');
        const d = document.createElement('div'); d.innerText = `> ${msg}`;
        lb.appendChild(d); lb.scrollTop = lb.scrollHeight;
    }

    // 2. 文件加载逻辑
    document.getElementById('fileInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(evt) {
            try {
                const workbook = XLSX.read(new Uint8Array(evt.target.result), { type: 'array' });
                const rows = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { header: 1, defval: null });
                let hIdx = rows.findIndex(r => r.some(c => c !== null));
                state.headers = rows[hIdx].filter(h => h);
                state.raw = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { range: hIdx, defval: 0 })
                            .filter(r => !JSON.stringify(r).includes("合计"));

                document.getElementById('fileStatus').classList.remove('hidden');
                document.getElementById('metricSection').classList.remove('hidden');
                document.getElementById('rowCount').innerText = `${state.raw.length} Rows`;
                
                initBaseConfigs();
                addLog(`解析成功! 请构建指标任务...`);
            } catch (err) { addLog(`解析失败: ${err}`); }
        };
        reader.readAsArrayBuffer(file);
    });

    function initBaseConfigs() {
        const baseIds = ['dateCol', 'aCol', 'bCol'];
        baseIds.forEach(id => {
            const s = document.getElementById(id); s.innerHTML = "";
            state.headers.forEach(h => s.add(new Option(h, h)));
        });

        // 智能初次推荐
        const find = (k) => state.headers.find(h => k.some(x => h.includes(x)));
        document.getElementById('dateCol').value = find(['时间', '日期']) || state.headers[0];
        
        const aH = find(['A人群', 'A组']), bH = find(['B人群', 'B组']);
        if(aH && bH) { document.getElementById('aCol').value = aH; document.getElementById('bCol').value = bH; }
        
        refreshValues('a'); refreshValues('b');
        
        // 自动添加第一个指标（尝试找点击和曝光）
        document.getElementById('metricList').innerHTML = "";
        const defNum = find(['点击', '支付', '订单']), defDen = find(['曝光', '展示', 'UV', '点击']);
        addMetricRow(defNum, defDen);
    }

    function refreshValues(type) {
        const col = document.getElementById(type + 'Col').value;
        const vals = [...new Set(state.raw.map(r => String(r[col] || "")))].filter(v => v);
        const sel = document.getElementById(type + 'Val'); sel.innerHTML = "";
        vals.forEach(v => sel.add(new Option(v, v)));
        if(vals.includes("1")) sel.value = "1";
    }

    // 3. 执行全指标分析
    document.getElementById('runBtn').onclick = function() {
        const rows = document.querySelectorAll('.metric-row');
        if(rows.length === 0) return alert("至少需要一个分析指标");
        
        const base = {
            dateCol: document.getElementById('dateCol').value,
            aCol: document.getElementById('aCol').value, aVal: document.getElementById('aVal').value,
            bCol: document.getElementById('bCol').value, bVal: document.getElementById('bVal').value
        };

        state.results = [];
        const dateSet = new Set();

        rows.forEach(row => {
            const mName = row.querySelector('.name-input').value || "未命名指标";
            const numCol = row.querySelector('.num-sel').value;
            const denCol = row.querySelector('.den-sel').value;

            let dataA = { totalNum: 0, totalDen: 0, daily: {} };
            let dataB = { totalNum: 0, totalDen: 0, daily: {} };

            state.raw.forEach(r => {
                const date = String(r[base.dateCol]);
                dateSet.add(date);
                if(String(r[base.aCol]) === base.aVal) update(dataA, r, date, numCol, denCol);
                if(String(r[base.bCol]) === base.bVal) update(dataB, r, date, numCol, denCol);
            });

            function update(obj, r, date, nc, dc) {
                const n = Number(r[nc])||0, d = Number(r[dc])||0;
                obj.totalNum += n; obj.totalDen += d;
                if(!obj.daily[date]) obj.daily[date] = { n: 0, d: 0 };
                obj.daily[date].n += n; obj.daily[date].d += d;
            }

            // 计算显著性
            const cA = dataA.totalNum/dataA.totalDen, cB = dataB.totalNum/dataB.totalDen;
            const pPool = (dataA.totalNum + dataB.totalNum) / (dataA.totalDen + dataB.totalDen);
            const se = Math.sqrt(pPool * (1-pPool) * (1/dataA.totalDen + 1/dataB.totalDen));
            const p = 2 * (1 - jStat.normal.cdf(Math.abs((cA - cB) / se), 0, 1));

            state.results.push({ name: mName, a: dataA, b: dataB, ctrA: cA, ctrB: cB, p: p, lift: (cA-cB)/cB });
        });

        state.sortedDates = Array.from(dateSet).sort();
        renderReport();
    };

    function renderReport() {
        document.getElementById('emptyState').classList.add('hidden');
        document.getElementById('resultArea').classList.remove('hidden');
        
        // 填充汇总表
        const tbody = document.getElementById('scorecardBody'); tbody.innerHTML = "";
        const selector = document.getElementById('chartMetricSelector'); selector.innerHTML = "";

        state.results.forEach((res, idx) => {
            const isSig = res.p < 0.05;
            const liftColor = res.lift > 0 ? (isSig?'text-emerald-600':'text-emerald-400') : (isSig?'text-red-600':'text-red-400');
            
            tbody.innerHTML += `
                <tr class="border-b hover:bg-slate-50 transition-colors">
                    <td class="px-6 py-5 font-black text-slate-800">${res.name}</td>
                    <td class="px-6 py-5 font-mono">${(res.ctrA*100).toFixed(2)}%</td>
                    <td class="px-6 py-5 font-mono text-slate-400">${(res.ctrB*100).toFixed(2)}%</td>
                    <td class="px-6 py-5 text-center font-black ${liftColor} text-sm">${(res.lift*100).toFixed(2)}%</td>
                    <td class="px-6 py-5 text-right">
                        <span class="px-2 py-1 rounded text-[10px] font-black ${isSig?'bg-emerald-100 text-emerald-700':'bg-slate-100 text-slate-400'}">
                            P=${res.p.toFixed(5)} ${isSig?'★':''}
                        </span>
                    </td>
                </tr>
            `;
            selector.add(new Option(res.name, idx));
        });

        updateChart();
        addLog("全量分析已完成！");
    }

    function updateChart() {
        if(state.chart) state.chart.destroy();
        const res = state.results[document.getElementById('chartMetricSelector').value];
        const ctx = document.getElementById('trendChart').getContext('2d');
        
        state.chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: state.sortedDates.map(d => d.includes('-') ? d.split('-').slice(1).join('/') : d),
                datasets: [
                    { label: '策略组(A)', data: state.sortedDates.map(d => res.a.daily[d] ? (res.a.daily[d].n/res.a.daily[d].d*100).toFixed(2) : null), borderColor: '#3b82f6', tension: 0.3, borderWidth: 3, pointRadius: 4 },
                    { label: '对照组(B)', data: state.sortedDates.map(d => res.b.daily[d] ? (res.b.daily[d].n/res.b.daily[d].d*100).toFixed(2) : null), borderColor: '#cbd5e1', borderDash: [5, 5], tension: 0.3 }
                ]
            },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'top', labels: { font: { weight: 'bold' } } } } }
        });
    }

    document.getElementById('exportBtn').onclick = function() {
        const aoa = [["指标名称", "策略组CTR", "对照组CTR", "提升幅度", "显著性(P值)", "结论"]];
        state.results.forEach(r => {
            aoa.push([r.name, (r.ctrA*100).toFixed(2)+"%", (r.ctrB*100).toFixed(2)+"%", (r.lift*100).toFixed(2)+"%", r.p.toFixed(6), r.p<0.05?(r.lift>0?"正向显著":"负向显著"):"不显著"]);
        });
        const ws = XLSX.utils.aoa_to_sheet(aoa);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "AB汇总报告");
        XLSX.writeFile(wb, `AB_MultiReport_${new Date().getTime()}.xlsx`);
    };
</script>
</body>
</html>
